<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Moderna</title>
    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        /* Grupo izquierdo */
        .nav-left {
            display: flex;
            gap: 2rem;
            flex: 1;
        }

        /* Logo centrado */
        .logo-wrapper {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        /* Grupo derecho */
        .nav-right {
            display: flex;
            gap: 2rem;
            flex: 1;
            justify-content: flex-end;
        }

        .nav-link {
            color: #333;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }

        .nav-link i {
            font-size: 1.1rem;
        }

        .nav-link:hover {
            color: #667eea;
            transform: translateY(-2px);
        }

        /* Indicador activo */
        .nav-link.active {
            color: #667eea;
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        /* Botón hamburguesa para móvil */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #333;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-left, .nav-right {
                display: none;
            }

            .nav-left.active, .nav-right.active {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                padding: 1rem;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                gap: 1rem;
                z-index: 1000;
            }

            .nav-left.active {
                top: 70px;
            }

            .nav-right.active {
                top: 70px;
                background: white;
            }

            .logo-wrapper {
                position: static;
                transform: none;
                flex: 1;
                text-align: center;
            }

            .nav-container {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>

            <!-- Enlaces izquierda -->
            <div class="nav-left" id="navLeft">
                <a href="#" class="nav-link active">
                    <i class="fas fa-home"></i> Inicio
                </a>
                <a href="#" class="nav-link">
                    <i class="fas fa-blog"></i> Blog
                </a>
                <a href="#" class="nav-link">
                    <i class="fas fa-briefcase"></i> Proyectos
                </a>
            </div>

            <!-- Logo centrado -->
            <div class="logo-wrapper">
                <a href="#" class="logo">✨ MiEmpresa</a>
            </div>

            <!-- Enlaces derecha -->
            <div class="nav-right" id="navRight">
                <a href="#" class="nav-link">
                    <i class="fas fa-user"></i> Perfil
                </a>
                <a href="#" class="nav-link">
                    <i class="fas fa-envelope"></i> Contacto
                </a>
            </div>
        </div>
    </nav>

    <div style="padding: 4rem 2rem; text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Navbar Moderna</h1>
        <p style="font-size: 1.2rem; color: #555;">Logo centrado con enlaces a los extremos</p>
        <p style="margin-top: 1rem; color: #777;">✨ Totalmente responsive ✨</p>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navLeft = document.getElementById('navLeft');
        const navRight = document.getElementById('navRight');

        menuToggle.addEventListener('click', () => {
            navLeft.classList.toggle('active');
            navRight.classList.toggle('active');
        });
    </script>
</body>
</html>
