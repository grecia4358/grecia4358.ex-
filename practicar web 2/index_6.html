<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar con Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: #1a1a2e;
            padding: 1.2rem 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Usando Grid para un control perfecto */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 2rem;
        }

        /* Enlaces izquierda */
        .nav-links-left {
            display: flex;
            gap: 2rem;
            justify-self: start;
        }

        /* Logo centrado */
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #e94560;
            text-decoration: none;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        /* Enlaces derecha */
        .nav-links-right {
            display: flex;
            gap: 2rem;
            justify-self: end;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
            padding: 0.5rem 0;
        }

        .nav-link:hover {
            color: #e94560;
        }

        /* Botón especial en la derecha */
        .btn-contacto {
            background: #e94560;
            padding: 0.5rem 1.2rem;
            border-radius: 25px;
            color: white;
        }

        .btn-contacto:hover {
            background: #ff6b6b;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                text-align: center;
            }

            .nav-links-left, 
            .nav-links-right {
                justify-self: center;
                gap: 1.5rem;
            }

            .logo {
                order: -1;
                margin-bottom: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links-left, 
            .nav-links-right {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-grid">
            <!-- Enlaces izquierda -->
            <div class="nav-links-left">
                <a href="#" class="nav-link">Inicio</a>
                <a href="#" class="nav-link">Blog</a>
                <a href="#" class="nav-link">Portafolio</a>
            </div>

            <!-- Logo centrado -->
            <a href="#" class="logo">✨ MiLogo</a>

            <!-- Enlaces derecha -->
            <div class="nav-links-right">
                <a href="#" class="nav-link">Acerca de</a>
                <a href="#" class="nav-link btn-contacto">Contacto</a>
            </div>
        </div>
    </nav>

    <div style="padding: 3rem; text-align: center;">
        <h1 style="color: #1a1a2e;">Navbar con Grid</h1>
        <p style="color: #666; margin-top: 1rem;">Logo perfectamente centrado con Grid CSS</p>
    </div>
</body>
</html>
